name: Morning Financial Briefing

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Check secret is configured
      env:
        BRIEFING_EMAIL_PASSWORD: ${{ secrets.BRIEFING_EMAIL_PASSWORD }}
      run: |
        if [ -z "$BRIEFING_EMAIL_PASSWORD" ]; then
          echo "::error::BRIEFING_EMAIL_PASSWORD secret is NOT set!"
          exit 1
        else
          echo "Secret is configured (${#BRIEFING_EMAIL_PASSWORD} chars)"
        fi
    - name: Run Morning Briefing
      env:
        BRIEFING_EMAIL_PASSWORD: ${{ secrets.BRIEFING_EMAIL_PASSWORD }}
        BRIEFING_RECIPIENT_EMAILS: ${{ secrets.BRIEFING_RECIPIENT_EMAILS }}
        AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      run: python3 morning_briefing.py 2>&1
    - name: Upload briefing HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: briefing-${{ github.run_id }}
        path: briefing_*.html
