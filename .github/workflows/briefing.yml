name: Morning Financial Briefing

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Debug info
      run: |
        python3 --version
        python3 -c "import smtplib, ssl, json, datetime, html, re, time, urllib.request, xml.etree.ElementTree; print('All imports OK')"
    - name: Run Morning Briefing
      env:
        BRIEFING_EMAIL_PASSWORD: ${{ secrets.BRIEFING_EMAIL_PASSWORD }}
      run: python3 morning_briefing.py 2>&1
    - name: Upload briefing HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: briefing-${{ github.run_id }}
        path: briefing_*.html
